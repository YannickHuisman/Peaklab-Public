<html lang="nl">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/icoon-logo-wit-transparant.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
    <meta name="theme-color" content="#0C1722" />
    <meta name="description" content="Peaklab - Performance biomarkers platform" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Peaklab" />
    <link rel="manifest" href="/manifest.json" />
    <title>Peaklab</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        var isDev =
          location.hostname === 'localhost' ||
          location.hostname === '127.0.0.1' ||
          location.hostname.endsWith('.local');
        window.addEventListener('load', () => {
          if (isDev) {
            navigator.serviceWorker.getRegistrations().then((regs) => {
              regs.forEach((r) => r.unregister());
            });
            caches.keys().then((keys) => keys.forEach((k) => caches.delete(k)));
            return;
          }
          navigator.serviceWorker.register('/sw.js').catch(() => {});
        });
      }
    </script>
  </body>
</html>
