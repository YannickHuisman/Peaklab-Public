# Railway configuration for backend service
# This file tells Railway how to build and run the backend

[build]
builder = "NIXPACKS"
buildCommand = "pnpm install && pnpm build && pnpm --filter backend build"

[deploy]
startCommand = "cd apps/backend && node dist/server.js"
healthcheckPath = "/health"
healthcheckTimeout = 100
restartPolicyType = "ON_FAILURE"
